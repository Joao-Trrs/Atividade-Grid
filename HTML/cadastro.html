<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/cadastro.css">
    <title>Criar Conta | Bonsai Tea</title>
</head>
<body>

    <header>
        <a href="../index.html" class="logo"></a>
        <nav class="nav">
            <a href="grade-produtos.html">Categorias</a>
        </nav>
        <div class="header-actions">
            <a href="carrinho.html" class="carrinho"></a>
        </div>
    </header>

    <div class="container">
        <form class="auth-form" action="meus-pedidos.html">
            <h2 style="text-align: center; color: var(--green);">Criar Conta</h2>
            <div class="form-grid">
                <div class="input-group">
                    <label>Nome completo</label>
                    <input type="text" placeholder="Seu nome" required>
                </div>
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" placeholder="seu@email.com" required>
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" placeholder="******" required>
                </div>
                <div class="input-group">
                    <label>Confirmar senha</label>
                    <input type="password" placeholder="******" required>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" required id="termos">
                    <label for="termos" style="font-size: 0.9em;">Li e aceito os Termos de Uso e Política de Privacidade</label>
                </div>
            </div>
            <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Criar Conta</button>
            <p style="text-align: center; font-size: 0.9em; margin-top: 10px;">Já tem uma conta? <a href="#" style="color: var(--green); text-decoration: underline;">Entrar</a></p>
        </form>
    </div>

    <footer>
        <div>
            <h3 class="logo"></h3>
            <p style="color: #ccc; margin-top: 10px;">Conectando você à natureza.</p>
        </div>
        <div>
            <h4>Institucional</h4>
            <ul>
                <li><a href="contato.html">Quem Somos</a></li>
                <li><a href="contato.html">Nossa Missão</a></li>
                <li><a href="contato.html">Política de Privacidade</a></li>
            </ul>
        </div>
        <div>
            <h4>Categorias</h4>
            <ul>
                <li><a href="grade-produtos.html">Chás e Infusões</a></li>
                <li><a href="grade-produtos.html">Bonsais</a></li>
                <li><a href="grade-produtos.html">Acessórios</a></li>
            </ul>
        </div>
        <div>
            <h4>Atendimento</h4>
            <ul>
                <li><a href="contato.html">Contato</a></li>
                <li><a href="pedidos.html">Meus Pedidos</a></li>
                <li><a href="cadastro.html">Cadastro</a></li>
            </ul>
        </div>
    </footer>
</body>
</html>
